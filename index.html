<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Escáner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
background:black;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}
h1{
margin-top:20px;
}
#reader{
width:90%;
max-width:500px;
margin:auto;
margin-top:20px;
}
#resultado{
font-size:30px;
margin-top:20px;
}
</style>

</head>

<body>

<h1>Escanear entrada</h1>

<div id="reader"></div>
<div id="resultado"></div>

<script>

let scanner
let escaneando = false

function onScanSuccess(decodedText){

if(escaneando) return
escaneando = true

scanner.clear()

let iframe = document.createElement("iframe")
iframe.style.display = "none"
iframe.src = decodedText

document.body.appendChild(iframe)

// Mostrar resultado visual (sin depender del fetch)

let resultado = document.getElementById("resultado")

resultado.innerHTML = "Procesando..."

setTimeout(() => {

document.body.style.background = "green"
resultado.innerHTML = "✔ Escaneado (verificar en sistema)"

}, 1500)

}

function iniciar(){

scanner = new Html5QrcodeScanner(
"reader",
{
fps:10,
qrbox:250,
videoConstraints:{ facingMode:"environment" }
}
)

scanner.render(onScanSuccess)

}

iniciar()

</script>

</body>
</html>
