<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Escáner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
background:black;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}
h1{
margin-top:20px;
}
#reader{
width:90%;
max-width:500px;
margin:auto;
margin-top:20px;
}
#resultado{
font-size:30px;
margin-top:20px;
}
</style>

</head>

<body>

<h1>Escanear entrada</h1>

<div id="reader"></div>
<div id="resultado"></div>

<script>

let scanner
let escaneando = false

function onScanSuccess(decodedText){

if(escaneando) return
escaneando = true

scanner.clear()

fetch(decodedText)
.then(r => r.json())
.then(data => {

let resultado = document.getElementById("resultado")

if(data.estado === "ok"){

document.body.style.background = "green"
resultado.innerHTML = "✅<br>" + data.nombre

}else if(data.estado === "usado"){

document.body.style.background = "orange"
resultado.innerHTML = "⚠️ YA INGRESÓ<br>" + data.nombre

}else{

document.body.style.background = "red"
resultado.innerHTML = "❌ QR INVÁLIDO"

}

})
.catch(() => {

document.body.style.background = "red"
document.getElementById("resultado").innerHTML = "Error de conexión"

})

}

function iniciar(){

scanner = new Html5QrcodeScanner(
"reader",
{
fps:10,
qrbox:250,
videoConstraints:{ facingMode:"environment" }
}
)

scanner.render(onScanSuccess)

}

iniciar()

</script>

</body>
</html>
