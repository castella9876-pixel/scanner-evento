<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Escáner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
background:black;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}
h1{
margin-top:20px;
}
#reader{
width:90%;
max-width:500px;
margin:auto;
margin-top:20px;
}
#resultado{
font-size:30px;
margin-top:20px;
}
</style>

</head>

<body>

<h1>Escanear entrada</h1>

<div id="reader"></div>
<div id="resultado"></div>

<script>

function onScanSuccess(decodedText){

fetch(decodedText)
.then(r => r.text())
.then(data => {

let limpio = data.replace(/<[^>]*>?/gm, '').trim()

let resultado = document.getElementById("resultado")

if(limpio.toLowerCase().includes("permitido")){

document.body.style.background = "green"
resultado.innerHTML = "✅ " + limpio

}else{

document.body.style.background = "red"
resultado.innerHTML = "❌ " + limpio

}

})

}

let scanner = new Html5QrcodeScanner(
"reader",
{
fps:10,
qrbox:250,
videoConstraints:{ facingMode:"environment" }
}
)

scanner.render(onScanSuccess)

</script>

</body>
</html>
