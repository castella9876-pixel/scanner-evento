<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Invitados</title>
  <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore-compat.js"></script>
  <style>
    body { margin: 0; font-family: system-ui; background: linear-gradient(135deg, #667eea, #764ba2); height: 100vh; display: flex; flex-direction: column; }
    .header { background: rgba(255,255,255,0.95); padding: 20px; text-align: center; }
    .scanner { flex: 1; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
    #video { width: 90vw; max-width: 400px; height: 60vw; max-height: 300px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    .result { position: fixed; inset: 0; background: rgba(0,0,0,0.9); color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: 0.3s; }
    .result.show { opacity: 1; visibility: visible; }
    .result-icon { font-size: 80px; margin-bottom: 20px; }
    .success .result-icon { color: #00ff88; }
    .error .result-icon { color: #ff4444; }
    .warning .result-icon { color: #ffaa00; }
    .btn-close { position: absolute; top: 30px; right: 20px; background: none; border: none; color: white; font-size: 30px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🎉 Control de Invitados</h1>
    <p>Escanea el QR code</p>
  </div>
  
  <div class="scanner">
    <video id="video" autoplay playsinline muted></video>
    <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:250px;height:250px;border:3px solid #00ff88;border-radius:20px;background:rgba(0,255,136,0.1);"></div>
  </div>

  <div class="result" id="result">
    <button class="btn-close" onclick="closeResult()">×</button>
    <div class="result-icon" id="icon"></div>
    <div class="result-title" id="title"></div>
    <div class="result-text" id="text"></div>
  </div>

  <script>
    // ⭐ PEGA TU firebaseConfig AQUÍ
    const firebaseConfig = {
  apiKey: "AIzaSyBoCeju66wejqjiW2ka-jWIm6eTdVLUgPI",
  authDomain: "database-9af17.firebaseapp.com",
  projectId: "database-9af17",
  storageBucket: "database-9af17.firebasestorage.app",
  messagingSenderId: "365122952136",
  appId: "1:365122952136:web:5e855d2d888d1cdc47befd",
  measurementId: "G-PFBXCDRBM0"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let stream;
    
    async function initCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ 
          video: { facingMode: 'environment' } 
        });
        document.getElementById('video').srcObject = stream;
        
        const jsQR = await import('https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js');
        scanQR();
      } catch(e) {
        alert('Activa la cámara');
      }
    }

    function scanQR() {
      const video = document.getElementById('video');
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      
      function tick() {
        if (video.readyState === video.HAVE_ENOUGH_DATA) {
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          ctx.drawImage(video, 0, 0);
          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const code = jsQR.default(imageData.data, imageData.width, imageData.height);
          
          if (code) {
            validateQR(code.data);
            return;
          }
        }
        requestAnimationFrame(tick);
      }
      tick();
    }

    async function validateQR(id) {
      try {
        const snap = await db.collection('invitados').doc(id).get();
        if (snap.exists) {
          const data = snap.data();
          if (data.escaneado) {
            showResult(true, true, `${data.nombre} (${data.dni})`, 'Ya ingresó');
          } else {
            await db.collection('invitados').doc(id).update({
              escaneado: true,
              hora: firebase.firestore.FieldValue.serverTimestamp()
            });
            showResult(true, false, `${data.nombre} (${data.dni})`, '¡Bienvenido!');
          }
        } else {
          showResult(false, false, '', `ID "${id}" no encontrado`);
        }
      } catch(e) {
        showResult(false, false, '', 'Sin conexión');
      }
    }

    function showResult(valid, scanned, name, msg) {
      const result = document.getElementById('result');
      const icon = document.getElementById('icon');
      const title = document.getElementById('title');
      const text = document.getElementById('text');
      
      if (valid && !scanned) {
        icon.textContent = '✅';
        title.textContent = '¡ENTRADA VÁLIDA!';
        text.innerHTML = `<strong>${name}</strong>`;
        result.className = 'result show success';
      } else if (valid && scanned) {
        icon.textContent = '⚠️';
        title.textContent = 'YA INGRESÓ';
        text.innerHTML = `<strong>${name}</strong>`;
        result.className = 'result show warning';
      } else {
        icon.textContent = '❌';
        title.textContent = 'CÓDIGO INVÁLIDO';
        text.textContent = msg;
        result.className = 'result show error';
      }
    }

    function closeResult() {
      document.getElementById('result').classList.remove('show');
    }

    initCamera();
  </script>
</body>
</html>
