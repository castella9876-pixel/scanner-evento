<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Escáner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
background:black;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}
h1{
margin-top:20px;
}
#reader{
width:90%;
max-width:500px;
margin:auto;
margin-top:20px;
}
#resultado{
font-size:30px;
margin-top:20px;
}
</style>

</head>

<body>

<h1>Escanear entrada</h1>

<div id="reader"></div>
<div id="resultado"></div>

<script>

let scanner
let bloqueado = false

function onScanSuccess(decodedText){

if(bloqueado) return
bloqueado = true

fetch(decodedText)
.then(async (r) => {

let text = await r.text()

try {
return JSON.parse(text)
} catch(e) {
throw new Error("Respuesta inválida: " + text)
}

})
.then(data => {

let resultado = document.getElementById("resultado")

if(data.estado === "ok"){

document.body.style.background = "green"
resultado.innerHTML = "✅ " + data.nombre

navigator.vibrate(100)

}else if(data.estado === "usado"){

document.body.style.background = "orange"
resultado.innerHTML = "⚠️ YA INGRESÓ " + data.nombre

navigator.vibrate([100,50,100])

}else{

document.body.style.background = "red"
resultado.innerHTML = "❌ QR INVÁLIDO"

navigator.vibrate(200)

}

// 🔥 vuelve a escanear automáticamente
setTimeout(() => {
bloqueado = false
document.body.style.background = "black"
resultado.innerHTML = "Listo para escanear..."
}, 1500)

})
.catch(() => {

document.body.style.background = "red"
document.getElementById("resultado").innerHTML = "Error"

setTimeout(() => {
bloqueado = false
}, 1500)

})

}

function iniciar(){

scanner = new Html5QrcodeScanner(
"reader",
{
fps:15, // más rápido
qrbox:250,
videoConstraints:{ facingMode:"environment" }
}
)

scanner.render(onScanSuccess)

}

iniciar()

</script>

</body>
</html>
