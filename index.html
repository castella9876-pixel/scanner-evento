<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
margin:0;
background:black;
color:white;
text-align:center;
font-family:sans-serif;
}

#reader {
width:100%;
}

#resultado {
font-size:24px;
margin-top:10px;
}
</style>
</head>

<body>

<h2>Scanner QR</h2>
<div id="reader"></div>
<div id="resultado">Cargando invitados...</div>

<script src="https://unpkg.com/html5-qrcode"></script>

<script>

let invitados = {}
let ultimoQR = null

// 🔥 CARGA INICIAL
fetch("https://script.google.com/macros/s/AKfycbwk2upXn5Sp53AZICtykq5cgTbFMcwKA9MyfUEZ1uWGixq40XOtnLmL9_pv9BH8_iJ-5Q/exec")
.then(async (r) => {

let text = await r.text()
console.log("RESPUESTA:", text)

try {
return JSON.parse(text)
} catch(e) {
throw new Error("No es JSON")
}

})
.then(data => {

data.forEach(p => {
invitados[p.id] = {
nombre: p.nombre + " " + p.apellido,
usado: p.usado === "SI"
}
})

document.getElementById("resultado").innerHTML = "Listo para escanear"

iniciarScanner()

})

function onScanSuccess(decodedText){

if(decodedText === ultimoQR) return

ultimoQR = decodedText

let id = decodedText.split("id=")[1]
let resultado = document.getElementById("resultado")

if(invitados[id]){

if(!invitados[id].usado){

invitados[id].usado = true

document.body.style.background = "green"
resultado.innerHTML = "✅ " + invitados[id].nombre
navigator.vibrate(100)

}else{

document.body.style.background = "orange"
resultado.innerHTML = "⚠️ YA INGRESÓ " + invitados[id].nombre
navigator.vibrate([100,50,100])

}

}else{

document.body.style.background = "red"
resultado.innerHTML = "❌ INVÁLIDO"
navigator.vibrate(200)

}

// 🔥 permitir escanear otro distinto inmediatamente
setTimeout(() => {
ultimoQR = null
}, 500)

}

}

function iniciarScanner(){

const scanner = new Html5QrcodeScanner(
"reader",
{
fps:20,
qrbox:250,
videoConstraints:{ facingMode:"environment" }
}
)

scanner.render(onScanSuccess)

}

</script>

</body>
</html>
